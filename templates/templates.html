<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Templates & Artifacts — QE Center of Excellence</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        :root {
            --bg: #0a0a0a;
            --bg-card: #141414;
            --bg-elevated: #1a1a1a;
            --border: #2a2a2a;
            --border-light: #3a3a3a;
            --text: #ffffff;
            --text-muted: #a0a0a0;
            --text-dim: #666666;
            --blue: #2563eb;
            --blue-dim: rgba(37,99,235,0.12);
            --blue-border: rgba(37,99,235,0.35);
            --blue-light: #60a5fa;
            --green: #22c55e;
            --green-dim: rgba(34,197,94,0.12);
            --green-border: rgba(34,197,94,0.5);
            --yellow: #eab308;
            --yellow-dim: rgba(234,179,8,0.12);
            --yellow-border: rgba(234,179,8,0.5);
            --red: #dc2626;
            --red-dim: rgba(220,38,38,0.12);
            --red-border: rgba(220,38,38,0.5);
            --cyan: #06b6d4;
            --cyan-dim: rgba(6,182,212,0.12);
            --cyan-border: rgba(6,182,212,0.35);
            --purple: #a855f7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* NAV BAR */
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 8px 24px;
            backdrop-filter: blur(12px);
        }
        .nav-back {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: color 0.2s;
        }
        .nav-back:hover { color: var(--text); }
        .nav-back svg { width: 16px; height: 16px; }
        .nav-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
        }
        .nav-logo {
            height: 26px;
            opacity: 0.7;
            mix-blend-mode: screen;
        }

        /* HERO */
        .hero {
            text-align: center;
            padding: 56px 24px 32px;
            max-width: 700px;
            margin: 0 auto;
        }
        .hero h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #ffffff 0%, var(--blue-light) 50%, var(--blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }
        .hero p {
            color: var(--text-muted);
            font-size: 1.05rem;
            font-weight: 400;
            margin-bottom: 24px;
        }
        .stats-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            font-size: 0.82rem;
            color: var(--text-dim);
        }
        .stats-bar .stat {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .stats-bar .stat strong {
            color: var(--text-muted);
            font-weight: 600;
        }
        .stats-bar .dot {
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: var(--border-light);
        }

        /* FILTER BAR */
        .filter-bar {
            max-width: 1048px;
            margin: 0 auto;
            padding: 0 24px 24px;
        }
        .filter-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .filter-tabs {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            flex: 1;
        }
        .filter-tab {
            padding: 6px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .filter-tab:hover {
            border-color: var(--border-light);
            color: var(--text);
        }
        .filter-tab.active {
            background: var(--blue-dim);
            border-color: var(--blue-border);
            color: var(--blue-light);
        }
        .filter-tab[data-category="test-documentation"].active {
            background: var(--blue-dim);
            border-color: var(--blue-border);
            color: var(--blue-light);
        }
        .filter-tab[data-category="daily-qe-work"].active {
            background: var(--green-dim);
            border-color: var(--green-border);
            color: var(--green);
        }
        .filter-tab[data-category="automation"].active {
            background: var(--cyan-dim);
            border-color: var(--cyan-border);
            color: var(--cyan);
        }
        .filter-tab[data-category="process-governance"].active {
            background: var(--yellow-dim);
            border-color: var(--yellow-border);
            color: var(--yellow);
        }
        .search-input {
            padding: 7px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text);
            font-size: 0.8rem;
            font-family: inherit;
            width: 220px;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-input::placeholder { color: var(--text-dim); }
        .search-input:focus { border-color: var(--blue-border); }
        .btn-expand-all {
            padding: 6px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn-expand-all:hover {
            border-color: var(--border-light);
            color: var(--text);
        }

        /* GRID */
        .templates-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            max-width: 1048px;
            margin: 0 auto;
            padding: 0 24px 48px;
        }
        @media (max-width: 768px) {
            .templates-grid { grid-template-columns: 1fr; }
            .hero h1 { font-size: 1.8rem; }
            .filter-row { flex-direction: column; align-items: stretch; }
            .search-input { width: 100%; }
        }

        /* CARDS */
        .template-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .template-card:hover {
            border-color: var(--border-light);
        }
        .template-card.hidden { display: none; }
        .card-accent {
            height: 3px;
        }
        .card-accent.blue { background: linear-gradient(90deg, var(--blue), var(--blue-light)); }
        .card-accent.green { background: linear-gradient(90deg, var(--green), #4ade80); }
        .card-accent.cyan { background: linear-gradient(90deg, var(--cyan), #22d3ee); }
        .card-accent.yellow { background: linear-gradient(90deg, var(--yellow), #facc15); }

        .card-header {
            padding: 20px 20px 16px;
        }
        .card-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 0.68rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 10px;
        }
        .card-badge.blue {
            background: var(--blue-dim);
            color: var(--blue-light);
            border: 1px solid var(--blue-border);
        }
        .card-badge.green {
            background: var(--green-dim);
            color: var(--green);
            border: 1px solid var(--green-border);
        }
        .card-badge.cyan {
            background: var(--cyan-dim);
            color: var(--cyan);
            border: 1px solid var(--cyan-border);
        }
        .card-badge.yellow {
            background: var(--yellow-dim);
            color: var(--yellow);
            border: 1px solid var(--yellow-border);
        }
        .card-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 6px;
        }
        .card-desc {
            font-size: 0.82rem;
            color: var(--text-muted);
            line-height: 1.5;
        }
        .card-actions {
            display: flex;
            gap: 8px;
            padding: 0 20px 16px;
        }
        .btn {
            padding: 7px 16px;
            border-radius: 8px;
            font-size: 0.78rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-preview {
            background: var(--bg-elevated);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }
        .btn-preview:hover {
            background: var(--border);
            color: var(--text);
        }
        .btn-preview.active {
            background: var(--blue-dim);
            color: var(--blue-light);
            border-color: var(--blue-border);
        }
        .btn-copy {
            background: var(--blue);
            color: #fff;
        }
        .btn-copy:hover {
            background: #3b82f6;
        }
        .btn-copy svg, .btn-preview svg {
            width: 14px;
            height: 14px;
        }

        /* PREVIEW PANEL */
        .card-preview {
            display: none;
            border-top: 1px solid var(--border);
            padding: 20px;
            max-height: 500px;
            overflow-y: auto;
        }
        .card-preview.open { display: block; }

        /* Scrollbar styling */
        .card-preview::-webkit-scrollbar { width: 6px; }
        .card-preview::-webkit-scrollbar-track { background: transparent; }
        .card-preview::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }

        /* RENDERED MARKDOWN STYLES */
        .md h1 {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }
        .md h2 {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--blue-light);
            margin: 20px 0 10px;
        }
        .md h3 {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            margin: 14px 0 8px;
        }
        .md p {
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .md ul, .md ol {
            margin: 8px 0 8px 20px;
            font-size: 0.82rem;
            color: var(--text-muted);
        }
        .md li { margin-bottom: 4px; }
        .md .checklist {
            list-style: none;
            margin-left: 0;
        }
        .md .checklist li {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 3px 0;
        }
        .md .checklist li::before {
            content: '';
            display: inline-block;
            width: 14px;
            height: 14px;
            min-width: 14px;
            border: 1.5px solid var(--border-light);
            border-radius: 3px;
            margin-top: 2px;
        }
        .md table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
            font-size: 0.78rem;
        }
        .md th {
            text-align: left;
            padding: 8px 10px;
            background: var(--bg-elevated);
            color: var(--text-muted);
            font-weight: 600;
            border: 1px solid var(--border);
            white-space: nowrap;
        }
        .md td {
            padding: 7px 10px;
            border: 1px solid var(--border);
            color: var(--text-muted);
        }
        .md code {
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            background: var(--bg-elevated);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.78rem;
            color: var(--cyan);
        }
        .md pre {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 16px;
            overflow-x: auto;
            margin: 10px 0;
            font-size: 0.76rem;
            line-height: 1.6;
        }
        .md pre code {
            background: none;
            padding: 0;
            color: var(--text-muted);
        }
        .md hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 16px 0;
        }
        .md strong { color: var(--text); font-weight: 600; }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--green);
            color: #fff;
            padding: 10px 24px;
            border-radius: 10px;
            font-size: 0.82rem;
            font-weight: 600;
            font-family: inherit;
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            box-shadow: 0 8px 32px rgba(34,197,94,0.3);
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* FOOTER */
        footer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 24px;
            color: var(--text-dim);
            font-size: 0.72rem;
            border-top: 1px solid var(--border);
        }
        .footer-logo {
            height: 16px;
            width: auto;
            opacity: 0.6;
        }
        footer .sep {
            width: 1px;
            height: 12px;
            background: var(--border);
        }
        footer strong {
            color: var(--text-muted);
        }
    </style>
</head>

## 1. Purpose
This document defines the overall testing approach for [Project Name] across all releases and phases.

## 2. Testing Levels

### Project-Level Strategy
| Level | Scope | Owner | Tools |
|-------|-------|-------|-------|

| Field | Description |

└── pom.xml / package.json

## BasePage Pattern
\`\`\`java
public class BasePage {
    protected WebDriver driver;
    protected WebDriverWait wait;

    public BasePage(WebDriver driver) {
        this.driver = driver;
        this.wait = new WebDriverWait(driver, Duration.ofSeconds(10));
    }

    protected void click(By locator) {
        wait.until(ExpectedConditions.elementToBeClickable(locator)).click();
    }

    protected void type(By locator, String text) {
        WebElement element = wait.until(ExpectedConditions.visibilityOfElementLocated(locator));
        element.clear();
        element.sendKeys(text);
    }

    protected String getText(By locator) {
        return wait.until(ExpectedConditions.visibilityOfElementLocated(locator)).getText();
    }

    protected boolean isDisplayed(By locator) {
        try {
            return driver.findElement(locator).isDisplayed();
        } catch (NoSuchElementException e) {
            return false;
        }
    }
}
\`\`\`

## Page Object Pattern
\`\`\`java
public class LoginPage extends BasePage {
    // Locators
    private final By emailField = By.id("email");
    private final By passwordField = By.id("password");
    private final By loginButton = By.cssSelector("[data-testid='login-btn']");
    private final By errorMessage = By.className("error-message");

    public LoginPage(WebDriver driver) {
        super(driver);
    }

    // Actions
    public DashboardPage loginAs(String email, String password) {
        type(emailField, email);
        type(passwordField, password);
        click(loginButton);
        return new DashboardPage(driver);
    }

    // Verifications
    public String getErrorMessage() {
        return getText(errorMessage);
    }
}
\`\`\`

## Key Rules
1. **One class per page** — never mix page elements
2. **No assertions in Page Objects** — return data, assert in tests
3. **Use meaningful locator strategies** — prefer id > css > xpath
4. **Return next page object** from navigation actions
5. **Components for reusable sections** — headers, footers, modals`

// MARKDOWN RENDERER (simple, purpose-built)
// ============================================================
function renderMarkdown(raw) {
    const lines = raw.split('\n');
    let html = '';
    let inTable = false;
    let inCodeBlock = false;
    let codeContent = '';
    let inList = false;
    let inChecklist = false;

    function closeList() {
        if (inChecklist) { html += '</ul>'; inChecklist = false; }
        if (inList) { html += '</ul>'; inList = false; }
    }

    function escapeHtml(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function inlineFormat(text) {
        // bold
        text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        // inline code
        text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
        return text;
    }

    for (let i = 0; i < lines.length; i++) {
        const line = lines[i];

        // Code blocks
        if (line.trim().startsWith('```')) {
            if (inCodeBlock) {
                html += '<pre><code>' + escapeHtml(codeContent.trim()) + '</code></pre>';
                codeContent = '';
                inCodeBlock = false;
            } else {
                closeList();
                if (inTable) { html += '</table>'; inTable = false; }
                inCodeBlock = true;
            }
            continue;
        }
        if (inCodeBlock) {
            codeContent += line + '\n';
            continue;
        }

        const trimmed = line.trim();

        // Empty line
        if (trimmed === '') {
            closeList();
            if (inTable) { html += '</table>'; inTable = false; }
            continue;
        }

        // HR
        if (trimmed === '---') {
            closeList();
            if (inTable) { html += '</table>'; inTable = false; }
            html += '<hr>';
            continue;
        }

        // Headings
        if (trimmed.startsWith('# ')) {
            closeList();
            if (inTable) { html += '</table>'; inTable = false; }
            html += '<h1>' + inlineFormat(trimmed.slice(2)) + '</h1>';
            continue;
        }
        if (trimmed.startsWith('## ')) {
            closeList();
            if (inTable) { html += '</table>'; inTable = false; }
            html += '<h2>' + inlineFormat(trimmed.slice(3)) + '</h2>';
            continue;
        }
        if (trimmed.startsWith('### ')) {
            closeList();
            if (inTable) { html += '</table>'; inTable = false; }
            html += '<h3>' + inlineFormat(trimmed.slice(4)) + '</h3>';
            continue;
        }

        // Table
        if (trimmed.startsWith('|')) {
            closeList();
            // separator row
            if (/^\|[\s\-:|]+\|$/.test(trimmed)) continue;

            const cells = trimmed.split('|').filter((c, idx, arr) => idx > 0 && idx < arr.length - 1).map(c => c.trim());

            if (!inTable) {
                inTable = true;
                html += '<table><tr>' + cells.map(c => '<th>' + inlineFormat(c) + '</th>').join('') + '</tr>';
            } else {
                html += '<tr>' + cells.map(c => '<td>' + inlineFormat(c) + '</td>').join('') + '</tr>';
            }
            continue;
        } else if (inTable) {
            html += '</table>';
            inTable = false;
        }

        // Checkbox list
        if (trimmed.startsWith('- [ ] ') || trimmed.startsWith('- [x] ')) {
            if (inList && !inChecklist) { html += '</ul>'; inList = false; }
            if (!inChecklist) { html += '<ul class="checklist">'; inChecklist = true; }
            html += '<li>' + inlineFormat(trimmed.slice(6)) + '</li>';
            continue;
        }

        // Bullet list
        if (trimmed.startsWith('- ')) {
            if (inChecklist) { html += '</ul>'; inChecklist = false; }
            if (!inList) { html += '<ul>'; inList = true; }
            html += '<li>' + inlineFormat(trimmed.slice(2)) + '</li>';
            continue;
        }

        // Numbered list
        if (/^\d+\.\s/.test(trimmed)) {
            closeList();
            if (!inList) { html += '<ol>'; inList = true; }
            html += '<li>' + inlineFormat(trimmed.replace(/^\d+\.\s/, '')) + '</li>';
            continue;
        } else if (inList) {
            // Check if it was an ol
            closeList();
        }

        // Paragraph
        closeList();
        html += '<p>' + inlineFormat(trimmed) + '</p>';
    }

    closeList();
    if (inTable) html += '</table>';
    if (inCodeBlock) html += '<pre><code>' + escapeHtml(codeContent.trim()) + '</code></pre>';

    return html;
}

// ============================================================
// RENDER CARDS
// ============================================================
const grid = document.getElementById('templatesGrid');

templates.forEach(t => {
    const card = document.createElement('div');
    card.className = 'template-card';
    card.dataset.category = t.category;
    card.dataset.title = t.title.toLowerCase();

    card.innerHTML = `
        <div class="card-accent ${t.color}"></div>
        <div class="card-header">
            <span class="card-badge ${t.color}">${t.categoryLabel}</span>
            <div class="card-title">${t.title}</div>
            <div class="card-desc">${t.description}</div>
        </div>
        <div class="card-actions">
            <button class="btn btn-preview" onclick="togglePreview(this)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                Preview
            </button>
            <button class="btn btn-copy" data-id="${t.id}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                Copy Template
            </button>
        </div>
        <div class="card-preview md">${renderMarkdown(t.raw)}</div>
    `;

    grid.appendChild(card);
});

// ============================================================
// INTERACTIONS
// ============================================================

// Toggle Preview
function togglePreview(btn) {
    const card = btn.closest('.template-card');
    const preview = card.querySelector('.card-preview');
    const isOpen = preview.classList.contains('open');
    preview.classList.toggle('open');
    btn.classList.toggle('active');
    btn.innerHTML = isOpen
        ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg> Preview'
        : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg> Collapse';
}

// Copy to clipboard
document.querySelectorAll('.btn-copy').forEach(btn => {
    btn.addEventListener('click', () => {
        const id = parseInt(btn.dataset.id);
        const template = templates.find(t => t.id === id);
        if (!template) return;
        navigator.clipboard.writeText(template.raw).then(() => {
            showToast();
        });
    });
});

// Toast
function showToast() {
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
}

// Category filter
document.querySelectorAll('.filter-tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        filterCards();
    });
});

// Search
document.getElementById('searchInput').addEventListener('input', filterCards);

function filterCards() {
    const activeCategory = document.querySelector('.filter-tab.active').dataset.category;
    const search = document.getElementById('searchInput').value.toLowerCase();

    document.querySelectorAll('.template-card').forEach(card => {
        const matchCat = activeCategory === 'all' || card.dataset.category === activeCategory;
        const matchSearch = !search || card.dataset.title.includes(search);
        card.classList.toggle('hidden', !(matchCat && matchSearch));
    });
}

// Expand All / Collapse All
const expandAllBtn = document.getElementById('expandAllBtn');
let allExpanded = false;
expandAllBtn.addEventListener('click', () => {
    allExpanded = !allExpanded;
    document.querySelectorAll('.template-card:not(.hidden)').forEach(card => {
        const preview = card.querySelector('.card-preview');
        const btn = card.querySelector('.btn-preview');
        if (allExpanded) {
            preview.classList.add('open');
            btn.classList.add('active');
            btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg> Collapse';
        } else {
            preview.classList.remove('open');
            btn.classList.remove('active');
            btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg> Preview';
        }
    });
    expandAllBtn.textContent = allExpanded ? 'Collapse All' : 'Expand All';
});
</script>
